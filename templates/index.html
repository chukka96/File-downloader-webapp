<!DOCTYPE html>
<html>

<head>
    <title>Downloader</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="container mt-5">

    <h2>Multi File Downloader</h2>

    <textarea id="urls"
              class="form-control"
              rows="10"
              placeholder="Paste one URL per line"></textarea>

    <br>

    <button class="btn btn-primary"
            onclick="startDownload()">
        Download
    </button>

    <br><br>

    <div class="progress">

        <div id="progressBar"
             class="progress-bar"
             role="progressbar"
             style="width:0%">
            0%
        </div>

    </div>

    <br>

    <h4>Download History</h4>

    <table class="table">

        <thead>
            <tr>
                <th>File</th>
                <th>Status</th>
            </tr>
        </thead>

        <tbody id="historyTable">

        </tbody>

    </table>

    <script src="{{ url_for('static', filename='app.js') }}"></script>

</body>

</html>
